apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: willapp-argo-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ropkyns/paulmart.git
    targetRevision: HEAD
    path: /config
  destination: 
    server: https://kubernetes.default.svc
    namespace: willapp

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true
